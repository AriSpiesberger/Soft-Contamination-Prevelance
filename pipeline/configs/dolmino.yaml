>>>>>>> 86fdd8e (updates, stablility, bucket sampling)

  # Output directory for results
  output_dir: "./experiments/dolmino_1pct/contamination"

  # Benchmarks to analyze
  benchmarks:
    - name: "musr_murder_mysteries"
      mode: "input_output"
    - name: "musr_object_placements"
      mode: "input_output"
    - name: "musr_team_allocation"
      mode: "input_output"
    - name: "mbpp"
      mode: "input_output"
    - name: "zebralogic"
      mode: "input_output"
    - name: "codeforces"
      mode: "input_output"

  # Cluster configuration (single GPU)
  cluster:
    world_size: 1
    gpu_batch_size: 8192
    corpus_gpu_chunk: 12000000  # ~24GB in FP16 for 4096-dim
    max_rows_per_block: 2000000  # Flush every 2M rows (~3GB buffer after hash_id fix)
    gpu_memory_threshold: 0.92
    ram_memory_threshold: 0.80  # Safe threshold after fixing hash_id duplication
    prefetch_files: 2  # Re-enable prefetching for better I/O performance
    flush_stagger_delay: 0.5

  # Checkpointing
  checkpoint_dir: "./experiments/dolmino_1pct/contamination/checkpoints"

  # CUDA optimizations
  cuda:
    launch_blocking: false
    expandable_segments: true
    float32_matmul_precision: "high"

# =============================================================================
# Stage 5: Finalize Results Configuration
# =============================================================================
finalize:
  # Input: output from analysis stage
  input_dir: "./experiments/dolmino_1pct/contamination"

  # Corpus file (for adding corpus text)
  corpus_file: "./experiments/dolmino_1pct/chunks/paragraphs.jsonl"

# =============================================================================
# Stage 6: Aggregate and Plot Configuration
# =============================================================================
aggregates:
  # Input: merged results
  input_dir: "./experiments/dolmino_1pct/contamination"

  # World size (must match analysis)
  source_world_size: 1
  world_size: 1

  # Histogram configuration
  num_bins: 1000
  hist_range:
    - -1.0
    - 1.0

  # Output plots
  plots:
    - "aggregate_histogram_linear.png"
    - "aggregate_histogram_log.png"
    - "aggregate_cdf.png"
    - "aggregate_topk.png"

  # CSV output
  top_k: 100
  output_csv: "top_100_contamination.csv"

# =============================================================================
# Paths Configuration (resolved relative to pipeline root)
# =============================================================================
paths:
  # Pipeline root directory
  pipeline_root: "/lambda/nfs/embeddings/SDTD_Main/pipeline"

  # Python virtual environment
  venv: "/lambda/nfs/embeddings/SDTD_Main/.venv/bin/python"

  # Logs directory
  logs_dir: "./logs"

# =============================================================================
# Stage Control
# =============================================================================
# Set to true to skip a stage (useful for re-runs)
skip_stages:
  download: false
  chunking: false
  embeddings: false
  analysis: false
  merge: false
  aggregates: false
