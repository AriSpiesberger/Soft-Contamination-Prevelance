# =============================================================================
# SDTD Pipeline Configuration for Dolmino Mix Dataset
# =============================================================================
# Configuration for running contamination analysis on dolma3_dolmino_mix-100B-1025
#
# Usage:
#   ./run_all.sh --config dolmino.yaml
# =============================================================================

# Pipeline identification
pipeline:
  name: "dolma3_dolmino_mix"
  dataset_short_name: "dolmino"
  description: "Dolma3 Dolmino Mix contamination analysis pipeline"
  version: "1.0"
  # Experiment directory - all outputs go here
  experiment_dir: "./experiments/dolmino_1pct"

# =============================================================================
# Stage 1: Data Download Configuration
# =============================================================================
download:
  # HuggingFace dataset source
  repo_id: "allenai/dolma3_dolmino_mix-100B-1025"

  # Sample percentage (1.0 = 100% of dataset)
  # Stratified sampling happens in chunking stage based on category distribution
  sample_percentage: 1.0

  # Total known size of dataset in TB (for progress estimation)
  known_total_tb: 1.0

  # Local output directory (relative to pipeline root)
  output_dir: "./experiments/dolmino_1pct/raw"

  # Parallel download workers (defaults to min(8, cpu_count))
  # Set to 1-2 for free HuggingFace tier to avoid rate limits
  num_workers: 2

  # File extensions to download
  extensions:
    - ".parquet"
    - ".json.gz"
    - ".jsonl"
    - ".json.zst"
    - ".zst"

# =============================================================================
# Stage 2: Chunking Configuration
# =============================================================================
chunking:
  # Mode: "paragraph" or "conversation"
  mode: "paragraph"

  # Input directory (output from download stage)
  input_dir: "./experiments/dolmino_1pct/raw"

  # Output file for paragraphs
  output_paragraphs: "./experiments/dolmino_1pct/chunks/paragraphs.jsonl"

  # Sample percentage (0.01 = 1% of total paragraphs)
  paragraph_sample_percentage: 0.01

  # Token filtering
  min_paragraph_tokens: 50
  max_paragraph_tokens: 1000

  # Tokenizer: Use tiktoken for fast token counting
  tokenizer_encoding: "cl100k_base"  # Fast GPT-4 style encoding

  # Processing
  num_workers: 12
  chunk_size: 1000

  # Conversation mode settings (used when mode: "conversation")
  conversation:
    # Format: "Prompt: {user_content}\n\nResponse: {assistant_content}"
    user_role: "user"       # Role name for prompts
    assistant_role: "assistant"  # Role name for responses
    content_field: "content"  # Field containing the actual text

# =============================================================================
# Stage 3: Embedding Generation Configuration
# =============================================================================
embeddings:
  # Model for embedding generation
  model: "nvidia/llama-embed-nemotron-8b"

  # Mode: "local" or "s3"
  mode: "local"

  # Local configuration (used when mode: "local")
  local:
    input_file: "./experiments/dolmino_1pct/chunks/paragraphs.jsonl"
    output_file: "./experiments/dolmino_1pct/embeddings/embeddings.parquet"

  # S3 configuration (used when mode: "s3")
  s3:
    bucket: "dolmo-3-sampling"
    region: "us-east-1"
    input_prefix: "dolmino_20260101"
    output_prefix: "embeddings/dolmino/v1/"
    buffer_size: 10485760  # 10MB
    max_pool_connections: 50
    max_retry_attempts: 10

  # Batch configuration (tuned for GPU with FP16)
  target_tokens_per_batch: 400000
  max_batch_size: 128
  max_seq_length: 1000

  # DataLoader
  num_loader_workers: 24
  prefetch_factor: 4

  # Local cache
  cache_dir: "/tmp/embedding_runner_cache"

# =============================================================================
# Stage 4: Contamination Analysis Configuration
# =============================================================================
analysis:
  # Input: directory containing corpus embeddings (parquet files)
