# =============================================================================
# SDTD Pipeline Configuration for Dolci-Instruct-RL Dataset
# =============================================================================
# Configuration for running contamination analysis on RL prompt data
#
# Usage:
#   export PIPELINE_CONFIG=configs/dolci_rl.yaml
#   ./run_all.sh
# =============================================================================

# Pipeline identification
pipeline:
  name: "dolci_instruct_rl"
  dataset_short_name: "dolci_rl"
  description: "Dolci Instruct RL contamination analysis pipeline"
  version: "1.0"

# =============================================================================
# Stage 1: Data Download Configuration
# =============================================================================
download:
  # HuggingFace dataset source
  repo_id: "allenai/Dolci-Instruct-RL"

  # Sample percentage (1.0 = 100% of dataset)
  sample_percentage: 1.0

  # Total known size of dataset in TB (for progress estimation)
  known_total_tb: 0.5

  # Local output directory (relative to pipeline root)
  output_dir: "./data/dolci_rl_sample"

  # Parallel download workers
  num_workers: 2

  # File extensions to download
  extensions:
    - ".parquet"
    - ".json.gz"
    - ".jsonl"
    - ".json.zst"
    - ".zst"

# =============================================================================
# Stage 2: Chunking Configuration - RL MODE
# =============================================================================
chunking:
  # Mode: "rl" for RL datasets with prompt/solution pairs
  mode: "rl"

  # Input directory (output from download stage)
  input_dir: "./data/dolci_rl_sample"

  # Output file for conversations (auto-generated based on dataset_short_name)
  output_paragraphs: "./data/dolci_rl_conversations.jsonl"

  # Sample percentage (1.0 = 100% of total conversations)
  paragraph_sample_percentage: 1.00

  # Token filtering (applied to the combined prompt+solution text)
  min_paragraph_tokens: 50
  max_paragraph_tokens: 2048

  # Tokenizer: Use tiktoken for fast token counting
  tokenizer_encoding: "cl100k_base"

  # Processing
  num_workers: 12
  chunk_size: 1000

  # RL mode settings
  rl:
    prompt_field: "prompt"
    solution_field: "solution"

  # Fallback conversation settings
  conversation:
    user_role: "user"
    assistant_role: "assistant"
    content_field: "content"

# =============================================================================
# Stage 3: Embedding Generation Configuration
# =============================================================================
embeddings:
  # Model for embedding generation
  model: "nvidia/llama-embed-nemotron-8b"

  # Mode: "local" or "s3"
  mode: "local"

  # Local configuration
  local:
    input_file: "./data/dolci_rl_conversations.jsonl"
    output_file: "./data/dolci_rl_embeddings.parquet"

  # Batch configuration (tuned for 40GB GPU with FP16 - conservative for long prompts)
  target_tokens_per_batch: 50000
  max_batch_size: 64
  max_seq_length: 2048

  # DataLoader
  num_loader_workers: 24
  prefetch_factor: 4

  # Local cache
  cache_dir: "/tmp/embedding_runner_cache"

# =============================================================================
# Stage 4: Contamination Analysis Configuration
# =============================================================================
analysis:
  # Input: directory containing corpus embeddings (parquet files)
  corpus_dir: "./data"
  corpus_file: "embeddings_dolci_rl_100pct.parquet"

  # Output directory for results
  output_dir: "./results/contamination_dolci_rl_100pct"

  # Benchmarks to analyze (input+output combined)
  benchmarks:
    - name: "musr"
      mode: "input_output"
    - name: "mbpp"
      mode: "input_output"
    - name: "zebralogic"
      mode: "input_output"

  # Cluster configuration (adjust based on your GPUs)
  cluster:
    world_size: 1
    gpu_batch_size: 8192
    corpus_gpu_chunk: 12000000
    max_rows_per_block: 5000000
    gpu_memory_threshold: 0.92
    ram_memory_threshold: 0.88
    prefetch_files: 3
    flush_stagger_delay: 0.5

  # Checkpointing
  checkpoint_dir: "./results/contamination_dolci_rl_100pct/checkpoints"

  # CUDA optimizations
  cuda:
    launch_blocking: false
    expandable_segments: true
    float32_matmul_precision: "high"

# =============================================================================
# Stage 5: Finalize Results Configuration
# =============================================================================
finalize:
  # Input: output from analysis stage
  input_dir: "./results/contamination_dolci_rl_100pct"

  # Corpus file (for adding corpus text)
  corpus_file: "./data/dolci_rl_conversations.jsonl"

# =============================================================================
# Stage 6: Aggregate and Plot Configuration
# =============================================================================
aggregates:
  # Input: results directory
  input_dir: "./results/contamination_dolci_rl_100pct"

  # World size (must match analysis)
  source_world_size: 1
  world_size: 1
  dataset_name: "dolci_rl"

  # Histogram configuration
  num_bins: 1000
  hist_range:
    - -1.0
    - 1.0

  # Output plots
  plots:
    - "aggregate_histogram_linear.png"
    - "aggregate_histogram_log.png"
    - "aggregate_cdf.png"
    - "aggregate_topk.png"

  # CSV output
  top_k: 100
  output_csv: "top_100_contamination.csv"

# =============================================================================
# Paths Configuration
# =============================================================================
paths:
  # Pipeline root directory
  pipeline_root: "/home/ubuntu/embeddings/SDTD_Main/pipeline"

  # Python virtual environment
  venv: "/home/ubuntu/embeddings/SDTD_Main/.venv/bin/python"

  # Logs directory
  logs_dir: "./logs"

# =============================================================================
# Stage Control
# =============================================================================
# Set to true to skip a stage (useful for re-runs)
skip_stages:
  download: false
  chunking: false
  embeddings: false
  analysis: false
  merge: false
  aggregates: false
