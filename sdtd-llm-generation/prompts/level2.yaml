      Transformations applied:
      - Number: 48 → 60
      - Object: clips → novels, friends → customers
      - Domain: personal sales → business sales
      - Time: April/May → September/October
      Preserved: "half as many", "altogether", sum structure

      Original: "Weng earns $12 an hour for babysitting. Yesterday, she just did 50 minutes of babysitting. How much did she earn?"

      Compositional variant (numbers + objects + name):
      "David earns $15 an hour for tutoring. Yesterday, he just did 40 minutes of tutoring. How much did he earn?"

      Transformations applied:
      - Numbers: $12 → $15, 50 → 40
      - Object: babysitting → tutoring
      - Name: Weng → David, she → he
      Preserved: "per hour", Yesterday, rate×time structure, "earn"

      VALIDATION CHECKLIST:
      □ Same solution algorithm applies (EXACT same steps)
      □ Proportional relationships preserved (if "half", still "half"; if ratio 3:6, still same ratio)
      □ 2-3 transformation types applied
      □ Difficulty is equivalent
      □ Maximum surface-level change while structure identical
      □ Mathematical operations unchanged

