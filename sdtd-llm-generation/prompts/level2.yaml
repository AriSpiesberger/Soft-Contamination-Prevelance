      DOMAIN PRESERVATION EXAMPLES:

      GOOD (domain-preserving):
      - Pizza → Cake (both food, both commonly divided)
      - Apples → Oranges (both fruits, both commonly counted)
      - Dogs → Cats (both pets, both commonly described)
