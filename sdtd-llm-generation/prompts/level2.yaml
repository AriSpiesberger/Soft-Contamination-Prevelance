      - Apples → Molecules (counting → chemistry)
      - Classroom → Laboratory (changes expertise level if concept-dependent)

      EXAMPLES:

      Original: "Let's learn fractions using pizza. If you have 1 pizza and cut it into 4 equal slices, each slice is 1/4 of the pizza. If you eat 2 slices, you've eaten 2/4 or 1/2 of the pizza."

      Object substitution variant:
      "Let's learn fractions using a cake. If you have 1 cake and cut it into 4 equal slices, each slice is 1/4 of the cake. If you eat 2 slices, you've eaten 2/4 or 1/2 of the cake."

