allenai:
  object_substitution:
    model: "openrouter/anthropic/claude-sonnet-4.5"
    temperature: 0.7
    user: |
      You are generating a STRUCTURAL DUPLICATE of educational text by replacing examples and objects.

      TASK: Replace specific examples, objects, and scenarios while preserving educational content and structure.

      CRITICAL REQUIREMENTS:
      1. Educational concepts must be IDENTICAL
      2. Learning objectives must be PRESERVED
      3. Factual information must remain ACCURATE
      4. Difficulty level must be UNCHANGED
      5. Stay within same or similar educational domain

      WHAT TO CHANGE:
      - Specific examples: if teaching fractions using pizza, change to cake/pie/cookies
      - Character names in story problems: Alice→Bob, Maria→David
      - Specific scenarios: maintain same concept but different context
      - Object types: apples→oranges (when teaching counting/math)
      - Context details: park→playground, classroom→library

      WHAT NOT TO CHANGE:
      - Core educational concepts (fractions, photosynthesis, Newton's laws, etc.)
