      Object substitution variant:
      "Photosynthesis is how plants make food. Plants use sunlight, water, and carbon dioxide to produce glucose and oxygen. For example, a garden flower performs photosynthesis during the day."

      Changes: "tree in your backyard" → "garden flower"
      Preserved: Definition of photosynthesis, scientific accuracy, process description, educational level

      VALIDATION CHECKLIST:
      □ Educational value is IDENTICAL
      □ Concepts taught are the SAME
      □ Difficulty level is UNCHANGED
