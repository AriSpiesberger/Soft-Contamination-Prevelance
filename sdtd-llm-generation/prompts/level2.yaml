codeforces:
  number_substitution:
    model: "openrouter/anthropic/claude-sonnet-4.5"
    temperature: 0.4
    user: |
      You are generating a STRUCTURAL DUPLICATE of a competitive programming problem by changing numerical constraints.

      TASK: Change numerical constraints while keeping the problem structure IDENTICAL.

      CRITICAL REQUIREMENTS:
      1. Algorithm/data structure requirements must be IDENTICAL
      2. Time/space complexity must be IDENTICAL
      3. Input/output format structure must be PRESERVED
      4. Technical terminology must NOT change
      5. Problem difficulty must be IDENTICAL
      6. Constraint feasibility must be maintained

      WHAT TO CHANGE:
      - Array/list size bounds (N): keep in same complexity class
      - Value range bounds: keep in same magnitude order
      - Specific numeric examples in sample input/output
      - Time limits (keep format, may adjust slightly if constraints change)

      WHAT NOT TO CHANGE:
      - Technical terms (array, graph, tree, sort, binary search, DP, etc.)
      - Algorithm type required (if greedy, stays greedy; if DP, stays DP)
      - Input/output format structure
      - Complexity class (O(n), O(n log n), O(n²), etc. must stay same)
      - Memory limit format
      - Problem category/type

      CONSTRAINT PRESERVATION RULES:

      SAFE changes (same complexity class):
      - N ≤ 10^5 → N ≤ 5×10^4 or N ≤ 2×10^5 (stays O(10^5) class)
      - Values ≤ 10^9 → Values ≤ 5×10^8 or ≤ 2×10^9 (same order)
      - Time limit: 1 second → 1 second or 2 seconds (if constraints adjusted)

      AVOID (changes complexity class):
      - N ≤ 10^5 → N ≤ 10^9 (changes from 10^5 to 10^9 class, may break O(n²) solutions)
      - Values ≤ 10^9 → Values ≤ 10^18 (may require different data type)

      FEASIBILITY CHECK:
      - Algorithm with complexity O(n log n) + N ≤ 10^5 → ~10^7 ops → feasible in 1-2 seconds ✓
      - Algorithm with complexity O(n²) + N ≤ 10^5 → ~10^10 ops → NOT feasible ✗

      EXAMPLE:

      Original: "Given an array of N integers (1 ≤ N ≤ 10^5), find the maximum element. Values: -10^9 ≤ A[i] ≤ 10^9. Time limit: 1 second. Memory limit: 256 MB."

      Number substitution variant:
      "Given an array of N integers (1 ≤ N ≤ 5×10^4), find the maximum element. Values: -5×10^8 ≤ A[i] ≤ 5×10^8. Time limit: 1 second. Memory limit: 256 MB."

      Changes:
      - N bound: 10^5 → 5×10^4 (same O(10^5) class)
      - Value range: 10^9 → 5×10^8 (same order of magnitude)
      Preserved:
      - "find the maximum element" (algorithm)
      - O(n) complexity still optimal
      - "array", "integers" (technical terms)
      - Input/output format
      - 1 second time limit (still feasible)

      VALIDATION CHECKLIST:
      □ Same algorithm category (sort/search/DP/greedy/etc.)
      □ Same time complexity class
      □ Same space complexity class
      □ Constraints remain feasible (solution fits in time/memory limits)
      □ Technical terminology identical
      □ Input/output format structure preserved

